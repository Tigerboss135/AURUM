<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>AURUM — Precious Metals Trading Platform</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#060709;--bg1:#0c0d14;--bg2:#12131b;--bg3:#1a1b24;--brd:#1e1f2a;--txt:#e8eaf0;--mut:#9b9eb2;--dim:#5b5e6e;--gld:#d4a843;--gld2:#f0d68a;--grn:#22c55e;--red:#ef4444;--amb:#f59e0b;--blue:#3b82f6;--card:#0e0f18}
body{background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px;line-height:1.6;padding-bottom:60px}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:#2a2b34;border-radius:3px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes glow{0%,100%{text-shadow:0 0 20px #d4a84333}50%{text-shadow:0 0 40px #d4a84366}}
.mono{font-family:'Courier New',monospace}
a{color:var(--gld);text-decoration:none}

/* Container */
.container{max-width:1200px;margin:0 auto;padding:0 20px}

/* Header */
.header{padding:20px 0;border-bottom:1px solid var(--brd);margin-bottom:24px;background:linear-gradient(180deg,#0a0b12,var(--bg))}
.header .container{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.logo{display:flex;align-items:center;gap:12px}
.logo-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#d4a843,#b8860b);font-size:22px;font-weight:800;color:var(--bg)}
.logo-name{font-size:28px;font-weight:800;letter-spacing:4px;background:linear-gradient(90deg,#d4a843,#f0d68a,#d4a843);-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:glow 4s ease-in-out infinite}
.logo-sub{font-size:10px;color:var(--dim);letter-spacing:2px;margin-top:-2px}
.header-warn{font-size:12px;color:var(--dim);max-width:400px;text-align:right;line-height:1.4}

/* Cards */
.card{background:var(--card);border:1px solid var(--brd);border-radius:12px;padding:20px;margin-bottom:16px}
.card-title{font-size:13px;font-weight:700;color:var(--gld);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:14px}

/* Live prices bar */
.price-bar{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.price-card{background:var(--card);border:1px solid var(--brd);border-radius:12px;padding:16px 20px;text-align:center}
.price-label{font-size:12px;color:var(--dim);font-weight:600;margin-bottom:4px}
.price-val{font-size:32px;font-weight:800;letter-spacing:-1px}
.price-chg{font-size:14px;font-weight:600;margin-top:2px}
.price-meta{font-size:10px;color:var(--dim);margin-top:4px}

/* Danger banner */
#dangerBanner{display:none;padding:12px 20px;background:#ef444422;border:1px solid #ef444444;border-radius:10px;color:var(--red);font-weight:600;font-size:13px;text-align:center;margin-bottom:16px}

/* Slot grid */
.slot-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;margin-bottom:24px}
.slot{background:var(--card);border:1px solid var(--brd);border-radius:12px;padding:16px;cursor:pointer;transition:all .2s}
.slot:hover{border-color:var(--dim);transform:translateY(-1px)}
.slot.selected{border-color:var(--gld);box-shadow:0 0 20px #d4a84322}
.slot.has-pos{border-left:4px solid var(--grn)}
.slot-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.slot-name{font-size:16px;font-weight:700}
.slot-tf{font-size:12px;padding:3px 8px;border-radius:5px;background:var(--bg);color:var(--gld);font-weight:700}
.slot-regime{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700}
.slot-signal{font-size:14px;font-weight:700;margin:6px 0}
.slot-risk{font-size:12px;padding:3px 10px;border-radius:5px;display:inline-block;font-weight:600}
.slot-meta{font-size:12px;color:var(--dim);margin-top:6px;display:flex;gap:12px;flex-wrap:wrap}
.slot-meta span{white-space:nowrap}

/* Active detail */
.detail-section{margin-bottom:24px}
.detail-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin:12px 0}
.detail-item{background:var(--bg);border:1px solid var(--brd);border-radius:8px;padding:12px;text-align:center}
.detail-item .label{font-size:10px;color:var(--dim);text-transform:uppercase;font-weight:600;margin-bottom:4px}
.detail-item .val{font-size:20px;font-weight:700}
.detail-info{display:flex;gap:20px;flex-wrap:wrap;font-size:13px;color:var(--dim);margin-top:10px}

/* Chart */
.chart-section{margin-bottom:24px}
.chart-controls{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap;align-items:center}
.chart-controls button{padding:6px 16px;border:1px solid var(--brd);border-radius:6px;background:var(--bg1);color:var(--mut);font-family:inherit;font-size:13px;cursor:pointer;font-weight:600}
.chart-controls button:hover{background:var(--bg2);color:var(--txt)}
.chart-wrap{position:relative;background:var(--card);border:1px solid var(--brd);border-radius:12px;overflow:hidden}
.chart-wrap canvas{cursor:crosshair;display:block}
#sliderWrap{padding:8px 16px;border-top:1px solid var(--brd);display:flex;align-items:center;gap:10px}
#sliderWrap label{font-size:11px;color:var(--dim);white-space:nowrap;font-weight:600}
#timeSlider{flex:1;height:8px;-webkit-appearance:none;appearance:none;background:#1a1b22;border-radius:4px;outline:none;cursor:pointer}
#timeSlider::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--gld);cursor:pointer;border:2px solid var(--bg)}

/* Factsheet */
.fact-grid{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.fact{text-align:center;min-width:70px;padding:8px 10px;background:var(--bg);border-radius:6px;border:1px solid var(--brd)}
.fact .fk{font-size:9px;color:var(--dim);text-transform:uppercase;font-weight:600}
.fact .fv{font-size:16px;font-weight:700}

/* Trade log */
.log-table{width:100%;border-collapse:collapse}
.log-table th{padding:8px 6px;text-align:left;color:var(--dim);font-weight:600;border-bottom:1px solid var(--brd);font-size:12px}
.log-table td{padding:8px 6px;border-bottom:1px solid #0e0f16;font-size:13px}

/* Right panel sections */
.side-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
@media(max-width:768px){.side-grid{grid-template-columns:1fr}}

/* Strategy health */
.health-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--brd);font-size:13px}

/* Robolyst */
.robo-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.robo-header .icon{font-size:20px}
.robo-header .name{font-weight:700;font-size:16px;color:var(--gld);letter-spacing:1.5px}

/* Responsive */
@media(max-width:600px){
  .price-bar{grid-template-columns:1fr}
  .slot-grid{grid-template-columns:1fr}
  .detail-grid{grid-template-columns:1fr}
  .side-grid{grid-template-columns:1fr}
  .container{padding:0 12px}
  .price-val{font-size:24px}
  .logo-name{font-size:22px}
}
</style></head><body>

function RMA(d,n){var r=[d[0]];for(var i=1;i<d.length;i++)r.push((r[i-1]*(n-1)+d[i])/n);return r}

function ATR(c,p){p=p||14;var tr=[c[0].h-c[0].l];for(var i=1;i<c.length;i++){var v=c[i],pr=c[i-1].c;tr.push(Math.max(v.h-v.l,Math.abs(v.h-pr),Math.abs(v.l-pr)))}return RMA(tr,p)}
function ADX(c,p){p=p||14;var pD=[0],nD=[0];for(var i=1;i<c.length;i++){var u=c[i].h-c[i-1].h,d=c[i-1].l-c[i].l;pD.push(u>d&&u>0?u:0);nD.push(d>u&&d>0?d:0)}var a=ATR(c,p),sp=RMA(pD,p),sn=RMA(nD,p);var pI=sp.map(function(v,i){return a[i]?v/a[i]*100:0}),nI=sn.map(function(v,i){return a[i]?v/a[i]*100:0});var dx=pI.map(function(v,i){var s=v+nI[i];return s===0?0:Math.abs(v-nI[i])/s*100});return{adx:RMA(dx,p),pDI:pI,nDI:nI}}

// ═══ RISK SCORING ═══
function scoreEntry(candles,i,ind,sig,slDist){
  var isL=(sig==='LONG'),score=0;
  // ADX strength (validated predictor)
  if(ind.adx[i]>35)score+=25;else if(ind.adx[i]>25)score+=18;else if(ind.adx[i]>20)score+=10;
  // DI alignment
  var diOk=isL?(ind.pDI[i]>ind.nDI[i]):(ind.nDI[i]>ind.pDI[i]);
  var diSep=Math.abs(ind.pDI[i]-ind.nDI[i]);
  if(diOk&&diSep>20)score+=20;else if(diOk&&diSep>10)score+=12;else if(diOk)score+=5;
  // SuperTrend agrees
  if((ind.st[i]===1&&isL)||(ind.st[i]===-1&&!isL))score+=15;
  // EMA50 trend (regime)
  if(ind.ema50[i]>ind.ema50[Math.max(0,i-10)])score+=10;else score-=5;
  // SL distance (exposure)
  var exposure;
  if(slDist<2)exposure='LOW';else if(slDist<5)exposure='MEDIUM';else exposure='HIGH';
  // Classify
  var conviction;
  if(score>=55)conviction='LOW RISK';else if(score>=35)conviction='MODERATE';else conviction='HIGH RISK';
  return{score:score,conviction:conviction,exposure:exposure}
}

// ═══ REGIME DETECTION ═══
function getRegime(ind,i){
  if(i<50||!ind.ema50[i])return'UNKNOWN';
  var priceAbove=ind.cl[i]>ind.ema50[i];
  var ema50rising=ind.ema50[i]>ind.ema50[i-10];
  if(priceAbove&&ema50rising)return'BULL';
  if(!priceAbove&&!ema50rising)return'BEAR';
  return'SIDEWAYS';
}

// ═══ BACKTEST ENGINE ═══
function runSlot(slot,candles){
  var ind=computeInd(candles),atr=ind.atr,ema20=ind.ema20;
  var signals=[],pos=null,pending=null;
  for(var i=50;i<candles.length;i++){
    // Handle bounce entries
    if(slot.bounce&&pending&&!pos){
      var isL2=(pending.sig==='LONG');
      var barsWaited=i-pending.idx;
      if(barsWaited>20){pending=null;continue}
      if(isL2){
        var lowest=candles[i].l;
        for(var j=pending.idx;j<=i;j++)if(candles[j].l<lowest)lowest=candles[j].l;
        var dip=(pending.price-lowest)/pending.price*100;
        if(dip>=2&&candles[i].c>candles[i-1].c&&candles[i].c>candles[i].o){
          var e=candles[i].c,sl=e-atr[i]*slot.sl;
          if(slot.cap){var mx=e*slot.cap/100;sl=Math.max(sl,e-mx)}
          var slPct=Math.abs(e-sl)/e*100;
          var risk=scoreEntry(candles,i,ind,pending.sig,slPct);
          var regime=getRegime(ind,i);
          pos={type:pending.sig,entry:e,idx:i,time:candles[i].t,sl:sl,tsl:sl,best:e,risk:risk,regime:regime};
          if(slot.exit==='fixed'){pos.tp=e+atr[i]*slot.tp;pos.target=pos.tp}
          else{pos.target=null}
          signals.push({action:'BUY',type:pending.sig,entry:e,idx:i,time:candles[i].t,sl:sl,tp:pos.tp,target:pos.target,risk:risk,regime:regime,slot:slot.id});
          pending=null;
        }
      }
      continue;
    }
    // Check for new signals
    if(!pos&&!pending){
      var sig=slot.fn(candles,i,ind);
      if(sig&&(slot.dir==='BOTH'||sig===slot.dir)){
        if(slot.bounce){
          pending={sig:sig,price:candles[i].c,idx:i};
        }else{
          var isL=(sig==='LONG'),e=candles[i].c;
          var sl=isL?e-atr[i]*slot.sl:e+atr[i]*slot.sl;
          if(slot.cap){var mx=e*slot.cap/100;if(isL)sl=Math.max(sl,e-mx);else sl=Math.min(sl,e+mx)}
          var slPct=Math.abs(e-sl)/e*100;
          var risk=scoreEntry(candles,i,ind,sig,slPct);
          var regime=getRegime(ind,i);
          pos={type:sig,entry:e,idx:i,time:candles[i].t,sl:sl,tsl:sl,best:e,risk:risk,regime:regime};
          if(slot.exit==='fixed'){pos.tp=isL?e+atr[i]*slot.tp:e-atr[i]*slot.tp;pos.target=pos.tp}
          else{pos.target=null}
          signals.push({action:isL?'BUY':'SELL',type:sig,entry:e,idx:i,time:candles[i].t,sl:sl,tp:pos.tp,target:pos.target,risk:risk,regime:regime,slot:slot.id});
        }
      }
    }
    // Manage position
    if(pos){
      var isL=(pos.type==='LONG'),hitSL,hitTP=false;
      if(slot.exit==='trail'){
        var nt=isL?ema20[i]-atr[i]:ema20[i]+atr[i];
        if(isL&&candles[i].c>pos.best){pos.best=candles[i].c;pos.tsl=Math.max(pos.tsl,nt)}
        else if(!isL&&candles[i].c<pos.best){pos.best=candles[i].c;pos.tsl=Math.min(pos.tsl,nt)}
        hitSL=isL?candles[i].l<=pos.tsl:candles[i].h>=pos.tsl;
      }else{
        hitSL=isL?candles[i].l<=pos.sl:candles[i].h>=pos.sl;
        hitTP=isL?candles[i].h>=pos.tp:candles[i].l<=pos.tp;
      }
      if(hitTP||hitSL||(i-pos.idx)>=slot.mh){
        var ep=hitTP?pos.tp:(hitSL?(pos.tsl||pos.sl):candles[i].c);
        var pnl=isL?(ep-pos.entry)/pos.entry*100:(pos.entry-ep)/pos.entry*100;
        signals.push({action:'EXIT',entry:ep,idx:i,time:candles[i].t,pnl:pnl,openIdx:pos.idx,exitType:isL?'SELL':'COVER',reason:hitTP?'TP':hitSL?'SL':'Timeout',slot:slot.id});
        pos=null;
      }
    }
  }
  var exits=signals.filter(function(s){return s.action==='EXIT'});
  var n=exits.length,w=exits.filter(function(e){return e.pnl>0}).length;
  var wr=n?Math.round(w/n*1000)/10:0;
  var comp=1;exits.forEach(function(e){comp*=(1+e.pnl/100)});
  var lastRegime=ind.ema50.length>50?getRegime(ind,candles.length-1):'UNKNOWN';
  return{signals:signals,position:pos,stats:{n:n,wr:wr,comp:Math.round((comp-1)*1000)/10},regime:lastRegime,ind:ind}
}

// ═══ CHART HOVER — crosshair + candle tooltip ═══
var _inCrosshair=false;
function drawCrosshair(mx, my) {
  var cv = document.getElementById('cv'), ct = cv.parentElement;
  if (!cv || !ct || !chartState.vis.length || _inCrosshair) return;
  _inCrosshair=true;
  // Redraw chart first (clears old crosshair)
  drawChart();
  
  var ctx = cv.getContext('2d');
  var dpr = window.devicePixelRatio || 1;
  var cs = chartState;
  var W = cs.W, H = cs.H;
  
  // Scale mouse coords
  var rect = cv.getBoundingClientRect();
  var x = (mx - rect.left);
  var y = (my - rect.top);
  
  // Check bounds
  if (x < cs.padL || x > W - cs.padR || y < cs.padT || y > H - cs.padB) {
    hoverIdx = -1;
    return;
  }
  
  ctx.save();
  // Note: drawChart() already set ctx.scale(dpr,dpr), don't double it
  
  // Map x to candle index
  var visN = cs.vis.length;
  var candleW = cs.cW / visN;
  var vi = Math.floor((x - cs.padL) / candleW);
  if (vi < 0) vi = 0;
  if (vi >= visN) vi = visN - 1;
  hoverIdx = vi;
  
  // Map y to price
  var price = cs.hi - ((y - cs.padT) / cs.cH) * cs.pR;
  
  var candleX = cs.padL + (vi + 0.5) * candleW;
  
  // Draw crosshair lines
  ctx.strokeStyle = '#ffffff33';
  ctx.lineWidth = 0.5;
  ctx.setLineDash([3, 3]);
  // Horizontal
  ctx.beginPath();
  ctx.moveTo(cs.padL, y);
  ctx.lineTo(W - cs.padR, y);
  ctx.stroke();
  // Vertical
  ctx.beginPath();
  ctx.moveTo(candleX, cs.padT);
  ctx.lineTo(candleX, H - cs.padB);
  ctx.stroke();
  ctx.setLineDash([]);
  
  // Price label on right axis
  ctx.fillStyle = '#1e293b';
  ctx.fillRect(W - cs.padR, y - 9, cs.padR, 18);
  ctx.fillStyle = '#e4e7ec';
  ctx.font = 'bold 10px monospace';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  ctx.fillText('$' + price.toFixed(cs.dec), W - cs.padR + 4, y);
  
  // Date label on bottom
  var c = cs.vis[vi];
  if (c) {
    var dateStr = ukD(c.t) + ' ' + ukT(c.t);
    ctx.fillStyle = '#1e293b';
    var dtw = ctx.measureText(dateStr).width + 8;
    ctx.fillRect(candleX - dtw/2, H - cs.padB, dtw, cs.padB);
    ctx.fillStyle = '#e4e7ec';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillText(dateStr, candleX, H - cs.padB + 3);
  }
  
  // Candle info tooltip
  if (c) {
    var isGreen = c.c >= c.o;
    var change = ((c.c - c.o) / c.o * 100);
    var range = ((c.h - c.l) / c.l * 100);
    
    // Position tooltip: prefer right side of candle, flip if near edge
    var ttW = 140, ttH = 82;
    var ttX = candleX + 12;
    var ttY = y - ttH / 2;
    if (ttX + ttW > W - cs.padR) ttX = candleX - ttW - 12;
    if (ttY < cs.padT) ttY = cs.padT;
    if (ttY + ttH > H - cs.padB) ttY = H - cs.padB - ttH;
    
    // Tooltip background
    ctx.fillStyle = '#0f1218';
    ctx.strokeStyle = '#2a2d38';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(ttX + 4, ttY);
    ctx.lineTo(ttX + ttW - 4, ttY);
    ctx.quadraticCurveTo(ttX + ttW, ttY, ttX + ttW, ttY + 4);
    ctx.lineTo(ttX + ttW, ttY + ttH - 4);
    ctx.quadraticCurveTo(ttX + ttW, ttY + ttH, ttX + ttW - 4, ttY + ttH);
    ctx.lineTo(ttX + 4, ttY + ttH);
    ctx.quadraticCurveTo(ttX, ttY + ttH, ttX, ttY + ttH - 4);
    ctx.lineTo(ttX, ttY + 4);
    ctx.quadraticCurveTo(ttX, ttY, ttX + 4, ttY);
    ctx.fill();
    ctx.stroke();
    
    // Content
    var lh = 14; // line height
    var tx = ttX + 8;
    var ty = ttY + 12;
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    
    // Date
    ctx.font = 'bold 9px monospace';
    ctx.fillStyle = '#8b8ea0';
    ctx.fillText(ukD(c.t) + ' ' + ukT(c.t), tx, ty);
    ty += lh;
    
    // OHLC
    ctx.font = '9px monospace';
    ctx.fillStyle = '#6b6e78'; ctx.fillText('O ', tx, ty);
    ctx.fillStyle = '#e4e7ec'; ctx.fillText('$' + c.o.toFixed(cs.dec), tx + 14, ty);
    ctx.fillStyle = '#6b6e78'; ctx.fillText('H ', tx + 70, ty);
    ctx.fillStyle = '#22c55e'; ctx.fillText('$' + c.h.toFixed(cs.dec), tx + 84, ty);
    ty += lh;
    
    ctx.fillStyle = '#6b6e78'; ctx.fillText('C ', tx, ty);
    ctx.fillStyle = isGreen ? '#22c55e' : '#ef4444'; ctx.fillText('$' + c.c.toFixed(cs.dec), tx + 14, ty);
    ctx.fillStyle = '#6b6e78'; ctx.fillText('L ', tx + 70, ty);
    ctx.fillStyle = '#ef4444'; ctx.fillText('$' + c.l.toFixed(cs.dec), tx + 84, ty);
    ty += lh;
    
    // Change and range
    ctx.fillStyle = isGreen ? '#22c55e' : '#ef4444';
    ctx.font = 'bold 9px monospace';
    ctx.fillText((change >= 0 ? '+' : '') + change.toFixed(2) + '%', tx, ty);
    ctx.fillStyle = '#6b6e78';
    ctx.font = '9px monospace';
    ctx.fillText('range ' + range.toFixed(2) + '%', tx + 56, ty);
  }
  
  ctx.restore();
  _inCrosshair=false;
}

function renderTradeLog(){
  var slot=SLOTS[activeSlot],r=slotResults[slot.id],el=document.getElementById('logSection');
  if(!r){el.innerHTML='';return}
  var dec=slot.dec,signals=r.signals,f=FACTS[slot.id];
  var cycles=[];
  for(var i=0;i<signals.length;i++){
    var s=signals[i];
    if(s.action!=='BUY'&&s.action!=='SELL')continue;
    if(s.action==='SELL'&&!s.sl)continue;
    var close=null;
    for(var j=i+1;j<signals.length;j++){if(signals[j].action==='EXIT'&&signals[j].openIdx===s.idx){close=signals[j];break}}
    if(close)cycles.push({open:s,close:close,days:Math.max(0,Math.round((close.time-s.time)/86400000)),pnl:close.pnl});
  }

  var h='<div class="card">';
  h+='<div class="card-title">'+slot.label+' \u2014 '+cycles.length+' Completed Trades</div>';
  if(cycles.length){
    h+='<div style="overflow-x:auto"><table class="log-table"><thead><tr>';
    h+='<th>Type</th><th>Entry Date</th><th>Entry Price</th><th>Expected</th><th>Actual Hold</th><th>Exit Date</th><th>Target</th><th>Exit Price</th><th style="text-align:right">P&L</th>';
    h+='</tr></thead><tbody>';
    cycles.slice().reverse().forEach(function(t){
      var isB=t.open.action==='BUY';
      var col=isB?'var(--grn)':'var(--red)';
      var pCol=t.pnl>=0?'var(--grn)':'var(--red)';
      var expH=f?(t.pnl>0?'~'+f.winHold.toFixed(0)+'d':'~'+f.lossHold.toFixed(0)+'d'):'?';
      var hC=f&&t.days<=f.avgHold*1.5?'var(--grn)':'var(--amb)';
      var tgtP=t.open.target?'$'+t.open.target.toFixed(dec):'Trail';
      h+='<tr>';
      h+='<td style="color:'+col+';font-weight:700">'+(isB?'LONG':'SHORT')+'</td>';
      h+='<td class="mono">'+ukD(t.open.time)+'</td>';
      h+='<td class="mono">$'+t.open.entry.toFixed(dec)+'</td>';
      h+='<td style="color:var(--dim)">'+expH+'</td>';
      h+='<td style="font-weight:600;color:'+hC+'">'+t.days+'d</td>';
      h+='<td class="mono">'+ukD(t.close.time)+'</td>';
      h+='<td class="mono" style="color:var(--dim)">'+tgtP+'</td>';
      h+='<td class="mono">$'+t.close.entry.toFixed(dec)+'</td>';
      h+='<td style="text-align:right;font-weight:700;color:'+pCol+'" class="mono">'+(t.pnl>=0?'+':'')+t.pnl.toFixed(2)+'%</td>';
      h+='</tr>';
    });
    h+='</tbody></table></div>';
  }else{
    h+='<div style="padding:16px;text-align:center;color:var(--dim);font-size:14px">No completed trades yet</div>';
  }
  h+='</div>';
  el.innerHTML=h;
}

// ═══ CHART HOVER STATE ═══
var chartState = {vis:[], si:0, ei:0, lo:0, hi:0, pR:1, padL:4, padR:68, padT:12, padB:28, W:0, H:0, dec:0, cW:0, cH:0};
var hoverIdx = -1;
// ═══ CHART ═══
function drawChart(){
  var cv=document.getElementById('cv'),ct=cv.parentElement;
  if(!cv||!ct)return;
  var ctx=cv.getContext('2d'),dpr=window.devicePixelRatio||1;
  var W=ct.clientWidth,H=ct.clientHeight;
  cv.width=W*dpr;cv.height=H*dpr;cv.style.width=W+'px';cv.style.height=H+'px';ctx.scale(dpr,dpr);
  var slot=SLOTS[activeSlot],candles=slotData[slot.id]||[],result=slotResults[slot.id];
  if(!candles.length||!result)return;
  var signals=result.signals,dec=slot.dec;
  var pad={t:12,r:68,b:28,l:4},cW=W-pad.l-pad.r,cH=H-pad.t-pad.b;
  var visN=viewState.mode==='all'?candles.length:Math.floor(cW/(viewState.z+2));
  // Filter weekend candles for display
  candles=candles.filter(function(c){var d=new Date(c.t).getUTCDay();return d!==0&&d!==6});
  if(visN<5)visN=5;if(visN>candles.length)visN=candles.length;
  var si,ei;
  if(viewState.mode==='all'){si=0;ei=candles.length}
  else if(viewState.startIdx<0){si=Math.max(0,candles.length-visN);ei=candles.length}
  else{si=Math.max(0,Math.min(viewState.startIdx,Math.max(0,candles.length-visN)));ei=Math.min(candles.length,si+visN)}
  if(si<0)si=0;if(ei>candles.length)ei=candles.length;if(ei<=si)ei=si+1;
  var vis=candles.slice(si,ei);
  if(!vis.length)return;
  ctx.fillStyle='#060709';ctx.fillRect(0,0,W,H);
  var lo=Infinity,hi=-Infinity;
  vis.forEach(function(c){lo=Math.min(lo,c.l);hi=Math.max(hi,c.h)});
  var rng=hi-lo||1;lo-=rng*.04;hi+=rng*.04;var pR=hi-lo;
  var toY=function(p){return pad.t+cH-((p-lo)/pR)*cH};
  var toX=function(i){return pad.l+(i+.5)*(cW/vis.length)};
  var cw=Math.max(1,Math.min(8,(cW/vis.length)*.6));
  // Grid
  ctx.strokeStyle='#111318';ctx.lineWidth=.5;
  var ps=pR/7;

// ═══ CHART HOVER — crosshair + candle tooltip ═══
var _inCrosshair=false;
function drawCrosshair(mx, my) {
  var cv = document.getElementById('cv'), ct = cv.parentElement;
  if (!cv || !ct || !chartState.vis.length || _inCrosshair) return;
  _inCrosshair=true;
  // Redraw chart first (clears old crosshair)
  drawChart();
  
  var ctx = cv.getContext('2d');
  var dpr = window.devicePixelRatio || 1;
  var cs = chartState;
  var W = cs.W, H = cs.H;
  
  // Scale mouse coords
  var rect = cv.getBoundingClientRect();
  var x = (mx - rect.left);
  var y = (my - rect.top);
  
  // Check bounds
  if (x < cs.padL || x > W - cs.padR || y < cs.padT || y > H - cs.padB) {
    hoverIdx = -1;
    return;
  }
  
  ctx.save();
  // Note: drawChart() already set ctx.scale(dpr,dpr), don't double it
  
  // Map x to candle index
  var visN = cs.vis.length;
  var candleW = cs.cW / visN;
  var vi = Math.floor((x - cs.padL) / candleW);
  if (vi < 0) vi = 0;
  if (vi >= visN) vi = visN - 1;
  hoverIdx = vi;
  
  // Map y to price
  var price = cs.hi - ((y - cs.padT) / cs.cH) * cs.pR;
  
  var candleX = cs.padL + (vi + 0.5) * candleW;
  
  // Draw crosshair lines
  ctx.strokeStyle = '#ffffff33';
  ctx.lineWidth = 0.5;
  ctx.setLineDash([3, 3]);
  // Horizontal
  ctx.beginPath();
  ctx.moveTo(cs.padL, y);
  ctx.lineTo(W - cs.padR, y);
  ctx.stroke();
  // Vertical
  ctx.beginPath();
  ctx.moveTo(candleX, cs.padT);
  ctx.lineTo(candleX, H - cs.padB);
  ctx.stroke();
  ctx.setLineDash([]);
  
  // Price label on right axis
  ctx.fillStyle = '#1e293b';
  ctx.fillRect(W - cs.padR, y - 9, cs.padR, 18);
  ctx.fillStyle = '#e4e7ec';
  ctx.font = 'bold 10px monospace';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  ctx.fillText('$' + price.toFixed(cs.dec), W - cs.padR + 4, y);
  
  // Date label on bottom
  var c = cs.vis[vi];
  if (c) {
    var dateStr = ukD(c.t) + ' ' + ukT(c.t);
    ctx.fillStyle = '#1e293b';
    var dtw = ctx.measureText(dateStr).width + 8;
    ctx.fillRect(candleX - dtw/2, H - cs.padB, dtw, cs.padB);
    ctx.fillStyle = '#e4e7ec';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillText(dateStr, candleX, H - cs.padB + 3);
  }
  
  // Candle info tooltip
  if (c) {
    var isGreen = c.c >= c.o;
    var change = ((c.c - c.o) / c.o * 100);
    var range = ((c.h - c.l) / c.l * 100);
    
    // Position tooltip: prefer right side of candle, flip if near edge
    var ttW = 140, ttH = 82;
    var ttX = candleX + 12;
    var ttY = y - ttH / 2;
    if (ttX + ttW > W - cs.padR) ttX = candleX - ttW - 12;
    if (ttY < cs.padT) ttY = cs.padT;
    if (ttY + ttH > H - cs.padB) ttY = H - cs.padB - ttH;
    
    // Tooltip background
    ctx.fillStyle = '#0f1218';
    ctx.strokeStyle = '#2a2d38';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(ttX + 4, ttY);
    ctx.lineTo(ttX + ttW - 4, ttY);
    ctx.quadraticCurveTo(ttX + ttW, ttY, ttX + ttW, ttY + 4);
    ctx.lineTo(ttX + ttW, ttY + ttH - 4);
    ctx.quadraticCurveTo(ttX + ttW, ttY + ttH, ttX + ttW - 4, ttY + ttH);
    ctx.lineTo(ttX + 4, ttY + ttH);
    ctx.quadraticCurveTo(ttX, ttY + ttH, ttX, ttY + ttH - 4);
    ctx.lineTo(ttX, ttY + 4);
    ctx.quadraticCurveTo(ttX, ttY, ttX + 4, ttY);
    ctx.fill();
    ctx.stroke();
    
    // Content
    var lh = 14; // line height
    var tx = ttX + 8;
    var ty = ttY + 12;
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    
    // Date
    ctx.font = 'bold 9px monospace';
    ctx.fillStyle = '#8b8ea0';
    ctx.fillText(ukD(c.t) + ' ' + ukT(c.t), tx, ty);
    ty += lh;
    
    // OHLC
    ctx.font = '9px monospace';
    ctx.fillStyle = '#6b6e78'; ctx.fillText('O ', tx, ty);
    ctx.fillStyle = '#e4e7ec'; ctx.fillText('$' + c.o.toFixed(cs.dec), tx + 14, ty);
    ctx.fillStyle = '#6b6e78'; ctx.fillText('H ', tx + 70, ty);
    ctx.fillStyle = '#22c55e'; ctx.fillText('$' + c.h.toFixed(cs.dec), tx + 84, ty);
    ty += lh;
    
    ctx.fillStyle = '#6b6e78'; ctx.fillText('C ', tx, ty);
    ctx.fillStyle = isGreen ? '#22c55e' : '#ef4444'; ctx.fillText('$' + c.c.toFixed(cs.dec), tx + 14, ty);
    ctx.fillStyle = '#6b6e78'; ctx.fillText('L ', tx + 70, ty);
    ctx.fillStyle = '#ef4444'; ctx.fillText('$' + c.l.toFixed(cs.dec), tx + 84, ty);
    ty += lh;
    
    // Change and range
    ctx.fillStyle = isGreen ? '#22c55e' : '#ef4444';
    ctx.font = 'bold 9px monospace';
    ctx.fillText((change >= 0 ? '+' : '') + change.toFixed(2) + '%', tx, ty);
    ctx.fillStyle = '#6b6e78';
    ctx.font = '9px monospace';
    ctx.fillText('range ' + range.toFixed(2) + '%', tx + 56, ty);
  }
  
  ctx.restore();
  _inCrosshair=false;
}

function pollPrice(){
  ['gold','silver'].forEach(function(inst){

    if(!livePrice[inst]){

      if(raw&&raw.length){
        var last=raw[raw.length-1];
        livePrice[inst]={price:last[4],ch:last[4]-last[1],time:last[0]*1000,fromData:true};
      }
    }
    // Try goldapi.io
    fetch('https://www.goldapi.io/api/'+sym+'/USD',{headers:{'x-access-token':API_KEY,'Content-Type':'application/json'}})
    .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json()})
    .then(function(data){
      if(data&&data.price){
        livePrice[inst]={price:data.price,ch:data.ch||0,time:Date.now(),fromData:false};
        updateLiveCandles(inst,data.price);
      }
    }).catch(function(){
      // Try alternative: metals.dev free API
      fetch('https://api.metals.dev/v1/latest?api_key=demo&currency=USD&unit=toz')
      .then(function(r){return r.json()})
      .then(function(data){
        if(data&&data.metals){
          var p=inst==='gold'?data.metals.gold:data.metals.silver;
          if(p){
            var old=livePrice[inst]?livePrice[inst].price:p;
            livePrice[inst]={price:p,ch:p-old,time:Date.now(),fromData:false};
            updateLiveCandles(inst,p);
          }
        }
      }).catch(function(){
        // Keep existing price (from data fallback), just mark it stale
        if(livePrice[inst])livePrice[inst].stale=true;
      });
    });
  });
  updateAll();
}

function updateLiveCandles(inst, price){
  SLOTS.filter(function(s){return s.inst===inst}).forEach(function(slot){
    var cs=Math.floor(Date.now()/slot.iv)*slot.iv;
    var dayOfWeek=new Date(cs).getUTCDay();
    if(dayOfWeek===0||dayOfWeek===6)return;
    var hist=slotData[slot.id]||[];
    var lastH=hist[hist.length-1];
    if(!lastH||cs<=lastH.t)return;
    var live=slotLive[slot.id]||[];
    var ex=-1;
    for(var k=0;k<live.length;k++)if(live[k].t===cs){ex=k;break}
    if(ex>=0){if(live[ex].v===0){live[ex].h=Math.max(live[ex].h,price);live[ex].l=Math.min(live[ex].l,price);live[ex].c=price}}
    else live.push({t:cs,o:price,h:price,l:price,c:price,st:lastH.st,v:0});
    slotLive[slot.id]=live;
    var raw=DATA[slot.dk];
    slotData[slot.id]=P(raw).concat(live);
    slotResults[slot.id]=runSlot(slot,slotData[slot.id]);
    dbSet('live3_'+slot.id,live);
  });
}

      // Sentiment + Crash Risk
      h+='<div style="display:flex;gap:8px;margin-bottom:6px">';
      h+='<div style="flex:1;text-align:center"><div style="font-size:7px;color:var(--dim)">SENTIMENT</div><div style="font-size:16px;font-weight:700;color:'+sc+'" class="mono">'+(a.s>0?'+':'')+a.s+'</div></div>';
      h+='<div style="flex:1;text-align:center"><div style="font-size:7px;color:var(--dim)">CRASH RISK</div><div style="font-size:16px;font-weight:700;color:'+crashCol+'" class="mono">'+a.crash_risk+'/10</div></div>';
      h+='<div style="flex:1;text-align:center"><div style="font-size:7px;color:var(--dim)">STATUS</div><div style="font-size:12px;font-weight:700;color:'+(a.r==='SAFE'?'#22c55e':a.r==='DANGER'?'#ef4444':'#f59e0b')+'">'+a.r+'</div></div>';
      h+='</div>';
      // Summary
      h+='<p style="font-size:9px;color:var(--mut);margin:0 0 6px;line-height:1.4">'+(a.sum||'')+'</p>';
      // Per-position advice
      if(a.positions&&a.positions.length){
        h+='<div style="font-size:8px;color:var(--dim);margin-bottom:3px;font-weight:600">POSITION ADVICE:</div>';
        a.positions.forEach(function(p){
          var ac=p.advice==='HOLD'?'#22c55e':p.advice==='EXIT NOW'?'#ef4444':'#f59e0b';
          h+='<div style="display:flex;gap:4px;font-size:8px;padding:3px 5px;background:var(--bg);border-radius:3px;margin-bottom:2px">';
          h+='<span style="font-weight:700;color:'+ac+'">'+p.advice+'</span>';
          h+='<span style="color:var(--dim)">'+p.slot+': '+p.reason+'</span></div>';
        });
      }
      // News factors
      if(a.f&&a.f.length){
        h+='<div style="margin-top:4px">';
        a.f.slice(0,3).forEach(function(f){
          var ic=f.i==='bullish'?'#22c55e':f.i==='bearish'?'#ef4444':'#f59e0b';
          h+='<div style="display:flex;gap:4px;font-size:8px;padding:3px 5px;background:var(--bg);border-radius:3px;margin-bottom:2px">';
          h+='<span style="width:4px;height:4px;border-radius:50%;margin-top:3px;flex-shrink:0;background:'+ic+'"></span>';
          h+='<div><span style="color:var(--txt);font-weight:600">'+f.e+'</span> <span style="color:var(--dim)">'+f.d+'</span></div></div>';
        });
        h+='</div>';
      }
      // Danger banner
      if(a.crash_risk>7){
        document.getElementById('dangerBanner').style.display='block';
        document.getElementById('dangerBanner').textContent='\u26A0 ROBOLYST CRASH WARNING ('+a.crash_risk+'/10): '+(a.sum||'Consider reducing all positions immediately.');
      }
      el.innerHTML=h;
    }
  }).catch(function(err){
    // CORS blocks API from file:// origins. Show helpful message + demo.
    var isLocal=window.location.protocol==='file:';
    var h='<div style="display:flex;align-items:center;gap:5px;margin-bottom:6px"><span style="font-size:13px">\uD83E\uDD16</span><span style="font-weight:700;font-size:12px;color:#d4a843;letter-spacing:1px">ROBOLYST</span></div>';
    if(isLocal){
      h+='<div style="padding:6px;background:#f59e0b11;border:1px solid #f59e0b33;border-radius:4px;margin-bottom:6px">';
      h+='<div style="font-size:9px;color:#f59e0b;font-weight:600;margin-bottom:3px">\u26A0 Running locally (file://)</div>';
      h+='<div style="font-size:8px;color:var(--dim);line-height:1.5">The Claude API blocks requests from local files. To enable Robolyst:<br>';
      h+='1. Upload to <b>GitHub Pages</b> (free)<br>';
      h+='2. Or run: <span style="color:var(--mut)">python3 -m http.server 8000</span><br>';
      h+='3. Then open <span style="color:var(--mut)">localhost:8000/aurum.html</span></div></div>';
    }else{
      h+='<div style="font-size:9px;color:var(--dim);padding:6px">API error: '+String(err).slice(0,80)+'. Retrying in 15 min.</div>';
    }
    // Show demo sentiment based on recent price action
    var slot=SLOTS[activeSlot];
    var cd=slotData[slot.id];
    if(cd&&cd.length>20){
      var recent=cd[cd.length-1].c;
      var older=cd[cd.length-20].c;
      var trend=((recent-older)/older*100);
      var demoS=Math.round(Math.max(-80,Math.min(80,trend*8)));
      var sc=demoS>30?'#22c55e':demoS<-30?'#ef4444':'#f59e0b';
      h+='<div style="margin-top:6px;font-size:8px;color:var(--dim)">Technical sentiment (offline estimate):</div>';
      h+='<div style="display:flex;justify-content:space-between;font-size:8px;color:var(--dim);margin:3px 0 2px"><span>Bear</span><span style="color:'+sc+';font-weight:700;font-size:14px">'+(demoS>0?'+':'')+demoS+'</span><span>Bull</span></div>';
      h+='<div style="height:4px;background:#111;border-radius:2px;position:relative;overflow:hidden"><div style="position:absolute;top:0;height:100%;border-radius:2px;left:'+(demoS>=0?'50%':(50+demoS/2)+'%')+';width:'+Math.abs(demoS)/2+'%;background:'+sc+'"></div></div>';
      h+='<div style="font-size:8px;color:var(--dim);margin-top:4px">20-bar trend: '+(trend>=0?'+':'')+trend.toFixed(1)+'% &rarr; '+(trend>3?'Bullish momentum':trend<-3?'Bearish pressure':'Consolidating')+'</div>';
    }
    el.innerHTML=h;
  });
}

// ═══ INIT ═══
async function init(){
  // Parse all data
  for(var i=0;i<SLOTS.length;i++){
    var slot=SLOTS[i];
    var live=await dbGet('live3_'+slot.id);
    slotLive[slot.id]=live||[];
    var parsed=P(DATA[slot.dk]);
    slotData[slot.id]=parsed.concat(slotLive[slot.id]||[]);
    slotResults[slot.id]=runSlot(slot,slotData[slot.id]);
  }
  updateAll();
  setupChart();
  updateSlider();
  window.addEventListener('resize',function(){resizeChart();drawChart()});
  // Start live
  pollPrice();
  setInterval(pollPrice,30000);
  setTimeout(runRobolyst,3000);
  setInterval(runRobolyst,15*60*1000);
}
init();
