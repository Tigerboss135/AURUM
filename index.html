<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>AURUM Server v4</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#060709;color:#e8eaf0;font-family:-apple-system,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.box{max-width:600px;text-align:center}
h1{font-size:36px;font-weight:800;letter-spacing:4px;background:linear-gradient(90deg,#d4a843,#f0d68a,#d4a843);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
.sub{color:#5b5e6e;font-size:12px;letter-spacing:2px;margin-bottom:32px}
.status{background:#0e0f18;border:1px solid #1e1f2a;border-radius:12px;padding:20px;margin-bottom:16px}
.status h3{color:#d4a843;font-size:13px;letter-spacing:1.5px;margin-bottom:12px}
.slot{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #1e1f2a;font-size:14px}
.slot:last-child{border:none}
.slot .name{font-weight:700}
.slot .wr{color:#22c55e;font-weight:600}
.badge{display:inline-block;padding:3px 10px;border-radius:6px;font-size:11px;font-weight:700;margin-top:16px}
.live{background:#22c55e22;color:#22c55e;border:1px solid #22c55e44}
.link{margin-top:24px}
.link a{color:#d4a843;font-size:14px;text-decoration:none;border:1px solid #d4a84344;padding:10px 24px;border-radius:8px;display:inline-block}
.link a:hover{background:#d4a84322}
.api{margin-top:24px;color:#5b5e6e;font-size:12px}
</style></head><body>
<div class="box">
  <h1>AURUM</h1>
  <div class="sub">PRECIOUS METALS TRADING INTELLIGENCE — SERVER v4</div>
  <div class="status">
    <h3>ACTIVE STRATEGIES</h3>
    <div class="slot"><span class="name">Gold 1H — ST+E50+MACD</span><span class="wr">61% WR | +21.9%/yr</span></div>
    <div class="slot"><span class="name">Gold 4H — E513+ST + ST+ADX↓</span><span class="wr">61% WR | +7.2%/yr</span></div>
    <div class="slot"><span class="name">Silver 1H — E513+ST+ADX</span><span class="wr">67% WR | +14.1%/yr</span></div>
    <span class="badge live">● SERVER ONLINE</span>
  </div>
  <div class="link"><a href="https://tigerboss135.github.io/AURUM/">Open Full Dashboard →</a></div>
  <div class="api">API: /api/status | /api/trades | /api/prices | /api/macro</div>
</div>
</body></html>
